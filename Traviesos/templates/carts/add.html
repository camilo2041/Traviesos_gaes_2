{% block content %}
<div class="col-3">
    {% if product.image %}
    <img src="{{ product.image.url }}" alt="Imagen del producto">
    {% endif %}
</div>
<div class="col">
    <div class="h3 font-weight-bold text-success">
        Producto agregado al carrito de compras
    </div>
    <div class="">
        <a href="{% url 'products:producto' product.slug %}">
            {{ product.title}}
        </a>
        <div class="font-weight-bold text-danger">
            ${{ product.price}}
        </div>
    </div>
</div>
{% endblock %}
