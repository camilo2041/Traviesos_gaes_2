{% block content %}
<div class="col-3">
    {% if producto.Imagen_producto %}
    <img src="{{ producto.Imagen_producto.url }}" alt="Imagen del producto">
    {% endif %}
</div>
<div class="col">
    <div class="h3 font-weight-bold text-success">
        Producto agregado al carrito de compras
    </div>
    <div class="">
        <a href="{% url 'juguetes' %}">
            {{ producto.Nombre_producto }}
        </a>
        <div class="font-weight-bold text-danger">
            ${{ producto.Precio_producto }}
        </div>
    </div>
</div>
{% endblock %}
