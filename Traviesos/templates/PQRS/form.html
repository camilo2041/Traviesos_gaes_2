{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="website icon" href="{% static 'image/image_home/home.png' %}">
    <title>Traviesos</title>
</head>
<header>
    <nav class="bg-orange-200 container-fluid">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-2">
                    <input type="text"
                        class="flex-grow px-6 py-2 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-orange-300 focus:border-orange-300"
                        placeholder="¿Qué deseas buscar?">
                    <span id="icon-search"
                        class="px-3 py-2 text-white bg-orange-300 rounded-md hover:bg-orange-200 cursor-pointer"><i
                            class="bi bi-search"></i></span>
                    <a href="carrito.html" class="text-gray-600 hover:text-gray-800 px-2 fs-5"><i
                            class="bi bi-cart-check-fill"></i></a>
                </div>
                <div class="flex items-center">
                    <a href="{% url 'index' %}"><img class="h-8 w-8" src="{% static 'image/image_home/home.png'%}"
                            alt="Logo"></a>
                    <div class="hidden md:block">
                        <ul class="flex space-x-4 font-bold fs-5 px-4 sm:">
                            <li><a href="{% url 'index' %}"
                                    class="text-gray-600 hover:bg-orange-300 hover:text-gray-600 px-3 py-2 rounded-md text-sm font-medium">Accesorios</a>
                            </li>
                            <li><a href="{% url 'index' %}"
                                    class="text-gray-600 hover:bg-orange-300 hover:text-gray-600 px-3 py-2 rounded-md text-sm font-medium">Alimentos</a>
                            </li>
                            <li><a href="{% url 'index' %}"
                                    class="text-gray-600 hover:bg-orange-300 hover:text-gray-600 px-3 py-2 rounded-md text-sm font-medium">Comentarios</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>

<body class="bg-orange-100">

    <div class="container">
        {% if messages %}
        <div class="row">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" role="alert">
                <p>{{ message }}</p>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <br><br><br><br><br><br><form method="POST" action="{% url 'pqrs' %}">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-12">
                    <label for="tipo" class="form-label"><b>Tipo de solicitud</b></label>
                    <select class="form-select" name="Tipo_pqrs" id="tipo" aria-label="Default select example" required>
                        <option value="" selected>Seleccionar</option>
                        <option value="Peticion">Peticion</option>
                        <option value="Queja">Queja</option>
                        <option value="Reclamo">Reclamo</option>
                        <option value="Sugerencia">Sugerencia</option>
                    </select><br>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label for="{{ .raza.id_for_label }}" class="form-label"><b>Descripción de la mascota</b></label>
                    <textarea class="form-control" name="Descripcion" placeholder="" id="descripcion" cols="100" style="height: 100px"></textarea>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button class="p-2 border-2 border-black rounded-md hover:bg-orange hover:text-orange-200" type="submit" value="Submit"><b>Enviar</b></button>
            </div>
        </form>
        
    </div>
</body>
