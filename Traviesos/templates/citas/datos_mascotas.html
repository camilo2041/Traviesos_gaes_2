{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://kit.fontawesome.com/7d08ee079d.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="//code.tidio.co/kczpks5iafw7sips7x6vfgjynam1qzs0.js" async></script>
  <link rel="stylesheet" href="{% static 'css/style3.css' %}">
  <link rel="website icon" href="{% static 'image/image_home/home.png' %}">
  <title>Mascotas</title>
</head>
<header>
  <nav class="bg-orange-200 container-fluid">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center space-x-2">
        </div>
        <div class="flex items-center">
          <a href="{% url 'index' %}"><img class="h-8 w-8" src="{% static 'image/image_home/home.png'%}" alt="Logo"></a>
          <div class="hidden md:block">
            <ul class="flex space-x-4 font-bold fs-5 px-4 sm:">
              <li><a href="{% url 'index' %}"
                  class="text-gray-600 hover:bg-orange-300 hover:text-gray-600 px-3 py-2 rounded-md text-sm font-medium">Accesorios</a>
              </li>
              <li><a href="{% url 'index' %}"
                  class="text-gray-600 hover:bg-orange-300 hover:text-gray-600 px-3 py-2 rounded-md text-sm font-medium">Alimentos</a>
              </li>
              <li><a href="{% url 'index' %}"
                  class="text-gray-600 hover:bg-orange-300 hover:text-gray-600 px-3 py-2 rounded-md text-sm font-medium">Comentarios</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>

<body class="bg-orange-50">
  <main class="content p-8 ">
    <div class="flex">
      <aside class="sidebar bg-gray-800 text-white h-screen fixed top-0 left-0 overflow-y-auto">
        <div class="p-4"><br><br>
          <h1 class="fs-5 font-semibold">¡Bienvenido a tu perfil, {{ user.username }}!</h1>
          <ul class="mt-4">
            <li class="py-2 hover:bg-gray-700"> <a href="{% url 'perfil' %}"><i class="bi bi-person-fill-gear"></i> Tus
                Datos</a></li>
            <li class="py-2 hover:bg-gray-700"> <a href="mascotas"><i class="fa-solid fa-dog"></i> Tus mascotas</a></li>
            <li class="py-2 hover:bg-gray-700"><a href="citas/lista_citas"><i
                  class="fa-sharp fa-solid fa-clipboard-list"></i> Tus citas</a></li>
          </ul>
        </div>
      </aside>
      <div class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <form class="bg-orange-200 p-4 text-center" method="post">
              {% csrf_token %}
              <h1 class="h2">Registra a tu mascota</h1>
              <div class="mb-3">
                <label for="{{ formulario.nombre.id_for_label }}" class="h5">Nombre</label>
                <input type="text" name="{{ formulario.nombre.name }}" id="{{ formulario.nombre.id_for_label }}" class="form-control" value="" required placeholder="">
              </div>
              <div class="mb-3">
                <label for="{{ formulario.raza.id_for_label }}" class="h5">Raza</label>
                {{ formulario.raza }}
            </div>
              <div class="mb-3">
                <label for="{{ formulario.peso.id_for_label }}" class="h5">Peso</label>
                <input type="text" name="{{ formulario.peso.name }}" id="{{ formulario.peso.id_for_label }}" class="form-control" value="" required placeholder="kg">
              </div>
              <div class="mb-3">
                <label for="{{ formulario.Tamaño.id_for_label }}" class="h5">Tamaño</label>
                {{ formulario.Tamaño }}
              </div>
              <div class="mb-3">
                <label for="{{ formulario.edad.id_for_label }}" class="h5">Edad</label>
                <input type="text" name="{{ formulario.edad.name }}" id="{{ formulario.edad.id_for_label }}" class="form-control" value="" required maxlength="3" min="1">
              </div>
              <div class="mb-3">
                <label for="{{ formulario.fecha_nacimiento.id_for_label }}" class="h5">Fecha de Nacimiento</label>
                <input type="date" name="{{ formulario.fecha_nacimiento.name }}" id="{{ formulario.fecha_nacimiento.id_for_label }}" class="form-control" value="" required min="2008-01-01" max="2023-09-21">
              </div>
              <div class="text-center">
                <button class="border-1 border-orange-500 p-2 rounded-md text-orange-500 hover:bg-orange-200 hover:text-orange" type="submit">Guardar <i class="fas fa-floppy-disk"></i></button>
              </div>
            </form>
            
          </div>
        </div>
      </div>

    </div>
    </div>
</body>
</main>
</body>

</html>
